name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Build
      run: |
        packages=$(go list ./... | grep -v '/cmd/')
        go build -v $packages

    - name: Test
      run: |
        packages=$(go list ./... | grep -v '/cmd/')
        go test -v $packages
